---
# ROLE: cluster_server_to_runner
# Runs on: SERVER node and RUNNER node (via separate plays in site.yml)
# TLS Type: Mutual TLS (mTLS) — gRPC over TCP
# node_section is set automatically based on which host group the node belongs to

- name: "INIT | Determine node section"
  ansible.builtin.set_fact:
    node_section: "{{ 'server' if inventory_hostname in groups[iag5_server_group] else 'runner' }}"

- name: "INIT | Set gateway_conf path based on node type"
  ansible.builtin.set_fact:
    gateway_conf: "{{ server_gateway_conf if inventory_hostname in groups[iag5_server_group] else client_gateway_conf }}"

- name: "INIT | Init results tracker"
  ansible.builtin.set_fact:
    check_results: []

# -----------------------------------------------------------------------
# [application] section — CA cert checks (same for both server and runner)
# -----------------------------------------------------------------------

- name: "CHECK 1 | Read ca_certificate_file from [application] section"
  ansible.builtin.shell:
    cmd: >
      awk '/^\[application\]/{f=1} f && /^\[/{if(!/^\[application\]/) f=0} f && /ca_certificate_file/' {{ gateway_conf }}
  register: ca_conf_line
  changed_when: false
  ignore_errors: true

- name: "CHECK 1 | Extract ca_certificate_file path"
  ansible.builtin.set_fact:
    ca_cert_path: "{{ ca_conf_line.stdout.split('=')[1] | trim | replace(\"'\", '') | replace('\"', '') }}"

- name: "CHECK 1 | Record result — ca_certificate_file set in [application]"
  ansible.builtin.set_fact:
    check_results: "{{ check_results + [
      {
        'check': 'CHECK 1 — [application] ca_certificate_file is set',
        'expected': 'ca_certificate_file = /path/to/ca-bundle.crt',
        'actual': ca_conf_line.stdout | default('NOT FOUND'),
        'status': '✅ PASS' if ca_conf_line.stdout != '' else '❌ FAIL'
      }
    ] }}"

- name: "CHECK 2 | Verify ca_certificate_file exists on disk"
  ansible.builtin.stat:
    path: "{{ ca_cert_path }}"
  register: ca_file_stat
  when: ca_cert_path is defined and ca_cert_path != ''

- name: "CHECK 2 | Record result — ca_certificate_file exists on disk"
  ansible.builtin.set_fact:
    check_results: "{{ check_results + [
      {
        'check': 'CHECK 2 — [application] ca_certificate_file exists on disk',
        'expected': 'File exists at ' + ca_cert_path,
        'actual': 'EXISTS' if (ca_file_stat.stat.exists | default(false)) else 'NOT FOUND on disk',
        'status': '✅ PASS' if (ca_file_stat.stat.exists | default(false)) else '❌ FAIL'
      }
    ] }}"

- name: "CHECK 3 | Verify CA bundle cert count"
  ansible.builtin.command:
    cmd: grep -c "BEGIN CERTIFICATE" {{ ca_cert_path }}
  register: ca_count
  changed_when: false
  ignore_errors: true
  when: ca_cert_path is defined and ca_cert_path != ''

- name: "CHECK 3 | Record result — CA bundle cert count"
  ansible.builtin.set_fact:
    check_results: "{{ check_results + [
      {
        'check': 'CHECK 3 — CA bundle cert count',
        'expected': 'At least 1 cert (root only is valid; 2 = root + intermediate)',
        'actual': ca_count.stdout | default('ERROR') + ' cert(s) found',
        'status': '✅ PASS' if ca_count.stdout | int >= 2
                  else ('⚠️  WARN — only root CA present, no intermediate (valid but less secure)'
                        if ca_count.stdout | int == 1
                        else '❌ FAIL — no certificates found in CA bundle')
      }
    ] }}"
  when: ca_cert_path is defined and ca_cert_path != ''

- name: "CHECK 4 | Verify CA cert has CA:TRUE"
  ansible.builtin.shell:
    cmd: openssl x509 -in {{ ca_cert_path }} -noout -text | grep -A1 "CA:"
  register: ca_basic_constraints
  changed_when: false
  ignore_errors: true
  when: ca_cert_path is defined and ca_cert_path != ''

- name: "CHECK 4 | Record result — CA cert has CA:TRUE"
  ansible.builtin.set_fact:
    check_results: "{{ check_results + [
      {
        'check': 'CHECK 4 — CA cert has CA:TRUE (can sign other certs)',
        'expected': 'CA:TRUE',
        'actual': ca_basic_constraints.stdout | default('NOT FOUND'),
        'status': '✅ PASS' if 'TRUE' in (ca_basic_constraints.stdout | default('')) else '❌ FAIL'
      }
    ] }}"
  when: ca_cert_path is defined and ca_cert_path != ''

- name: "CHECK 5 | Verify last cert in CA bundle is self-signed root (subject hash == issuer hash)"
  ansible.builtin.shell:
    cmd: >
      openssl x509 -in <(awk '/-----BEGIN CERTIFICATE-----/{c++} c==2{print}' {{ ca_cert_path }})
      -noout -subject_hash &&
      openssl x509 -in <(awk '/-----BEGIN CERTIFICATE-----/{c++} c==2{print}' {{ ca_cert_path }})
      -noout -issuer_hash
  args:
    executable: /bin/bash
  register: ca_hash_check
  changed_when: false
  ignore_errors: true
  when: ca_cert_path is defined and ca_cert_path != ''

- name: "CHECK 5 | Record result — last cert in CA bundle is self-signed root"
  ansible.builtin.set_fact:
    check_results: "{{ check_results + [
      {
        'check': 'CHECK 5 — Last cert in CA bundle is self-signed root (subject hash == issuer hash)',
        'expected': 'Both hashes match',
        'actual': ca_hash_check.stdout | default('ERROR'),
        'status': '✅ PASS' if (ca_hash_check.stdout_lines | default([]) | length == 2 and ca_hash_check.stdout_lines[0] == ca_hash_check.stdout_lines[1]) else '❌ FAIL'
      }
    ] }}"
  when: ca_cert_path is defined and ca_cert_path != ''

# -----------------------------------------------------------------------
# [server] or [runner] section — read use_tls first, gate cert checks on it
# -----------------------------------------------------------------------

- name: "CHECK 6 | Read use_tls — node section {{ node_section }}"
  ansible.builtin.shell:
    cmd: >
      awk '/^\[{{ node_section }}\]/{f=1} f && /^\[/{if(!/^\[{{ node_section }}\]/) f=0} f && /use_tls/' {{ gateway_conf }}
  register: node_usetls
  changed_when: false
  ignore_errors: true

- name: "CHECK 6 | Set tls_enabled fact"
  ansible.builtin.set_fact:
    tls_enabled: "{{ 'true' in (node_usetls.stdout | default('')) }}"

- name: "CHECK 6 | Record result — use_tls — node section {{ node_section }}"
  ansible.builtin.set_fact:
    check_results: "{{ check_results + [
      {
        'check': 'CHECK 6 — [' + node_section + '] use_tls',
        'expected': 'use_tls = true',
        'actual': node_usetls.stdout | default('NOT FOUND'),
        'status': '✅ PASS' if tls_enabled else '❌ FAIL — TLS disabled, skipping cert checks'
      }
    ] }}"

# -----------------------------------------------------------------------
# CHECK 7 — server specific: distributed_execution
#            runner specific: listen_address
# -----------------------------------------------------------------------

- name: "CHECK 7 | Read distributed_execution from [server] section"
  ansible.builtin.shell:
    cmd: >
      awk '/^\[server\]/{f=1} f && /^\[/{if(!/^\[server\]/) f=0} f && /distributed_execution/' {{ gateway_conf }}
  register: dist_exec
  changed_when: false
  ignore_errors: true
  when: node_section == 'server'

- name: "CHECK 7 | Record result — [server] distributed_execution"
  ansible.builtin.set_fact:
    check_results: "{{ check_results + [
      {
        'check': 'CHECK 7 — [server] distributed_execution = true',
        'expected': 'distributed_execution = true',
        'actual': dist_exec.stdout | default('NOT FOUND'),
        'status': '✅ PASS' if 'true' in (dist_exec.stdout | default('')) else '❌ FAIL'
      }
    ] }}"
  when: node_section == 'server'

- name: "CHECK 7 | Read listen_address from [runner] section"
  ansible.builtin.shell:
    cmd: >
      awk '/^\[runner\]/{f=1} f && /^\[/{if(!/^\[runner\]/) f=0} f && /listen_address/' {{ gateway_conf }}
  register: runner_listen
  changed_when: false
  ignore_errors: true
  when: node_section == 'runner'

- name: "CHECK 7 | Record result — [runner] listen_address"
  ansible.builtin.set_fact:
    check_results: "{{ check_results + [
      {
        'check': 'CHECK 7 — [runner] listen_address is set',
        'expected': 'listen_address = <runner-ip>',
        'actual': runner_listen.stdout | default('NOT FOUND'),
        'status': '✅ PASS' if runner_listen.stdout != '' else '❌ FAIL'
      }
    ] }}"
  when: node_section == 'runner'

# -----------------------------------------------------------------------
# Runner SAN IP validation (runner only)
# Three-leg check: inventory private_ip → cert SAN → actual interface IP
# -----------------------------------------------------------------------

- name: "CHECK 8 | Get actual interface IPs on runner"
  ansible.builtin.shell:
    cmd: ip addr show | grep "inet " | awk '{print $2}' | cut -d/ -f1
  register: runner_interface_ips
  changed_when: false
  ignore_errors: true
  when: node_section == 'runner'

- name: "CHECK 8 | Record result — inventory private_ip present on runner interface"
  ansible.builtin.set_fact:
    check_results: "{{ check_results + [
      {
        'check': 'CHECK 8a — [runner] inventory private_ip present on actual interface',
        'expected': 'IP ' + hostvars[inventory_hostname]['private_ip'] + ' found on interface',
        'actual': runner_interface_ips.stdout_lines | default([]) | join(', '),
        'status': '✅ PASS' if hostvars[inventory_hostname]['private_ip'] in (runner_interface_ips.stdout_lines | default([])) else '❌ FAIL — private_ip not found on any interface'
      }
    ] }}"
  when: node_section == 'runner'


# -----------------------------------------------------------------------
# CHECK 9-16 — cert checks, same logic for both nodes
# -----------------------------------------------------------------------

- name: "CHECK 9 | Read certificate_file — node section {{ node_section }}"
  ansible.builtin.shell:
    cmd: >
      awk '/^\[{{ node_section }}\]/{f=1} f && /^\[/{if(!/^\[{{ node_section }}\]/) f=0} f && /certificate_file/' {{ gateway_conf }}
  register: node_cert_conf
  changed_when: false
  ignore_errors: true
  when: tls_enabled

- name: "CHECK 9 | Extract certificate_file path"
  ansible.builtin.set_fact:
    node_cert_path: "{{ node_cert_conf.stdout.split('=')[1] | trim | replace(\"'\", '') | replace('\"', '') }}"
  when: tls_enabled

- name: "CHECK 9 | Record result — certificate_file set — node section {{ node_section }}"
  ansible.builtin.set_fact:
    check_results: "{{ check_results + [
      {
        'check': 'CHECK 9 — [' + node_section + '] certificate_file is set',
        'expected': 'certificate_file = /path/to/cert',
        'actual': node_cert_conf.stdout | default('NOT FOUND') if tls_enabled else 'N/A',
        'status': '✅ PASS' if (tls_enabled and (node_cert_conf.stdout | default('')) != '') else ('⏭ SKIPPED — TLS disabled' if not tls_enabled else '❌ FAIL')
      }
    ] }}"

- name: "CHECK 10 | Verify certificate_file exists on disk"
  ansible.builtin.stat:
    path: "{{ node_cert_path }}"
  register: node_cert_stat
  when: tls_enabled and node_cert_path is defined and node_cert_path != ''

- name: "CHECK 10 | Record result — certificate_file exists on disk"
  ansible.builtin.set_fact:
    check_results: "{{ check_results + [
      {
        'check': 'CHECK 10 — [' + node_section + '] certificate_file exists on disk',
        'expected': 'File exists at ' + (node_cert_path | default('N/A')),
        'actual': 'EXISTS' if (node_cert_stat.stat.exists | default(false)) else 'NOT FOUND on disk',
        'status': '✅ PASS' if (node_cert_stat.stat.exists | default(false)) else ('⏭ SKIPPED — TLS disabled' if not tls_enabled else '❌ FAIL')
      }
    ] }}"

- name: "CHECK 10b | Get SANs from runner cert"
  ansible.builtin.shell:
    cmd: openssl x509 -in {{ node_cert_path }} -noout -text | grep -A2 "Subject Alternative Name"
  register: runner_cert_sans
  changed_when: false
  ignore_errors: true
  when: node_section == 'runner' and tls_enabled and node_cert_path is defined and node_cert_path != ''

- name: "CHECK 10b | Record result — runner inventory private_ip present in cert SANs"
  ansible.builtin.set_fact:
    check_results: "{{ check_results + [
      {
        'check': 'CHECK 10b — [runner] inventory private_ip present in cert SANs',
        'expected': 'IP:' + hostvars[inventory_hostname]['private_ip'] + ' in Subject Alternative Name',
        'actual': runner_cert_sans.stdout | default('NO SANs FOUND'),
        'status': '✅ PASS' if ('IP:' + hostvars[inventory_hostname]['private_ip']) in (runner_cert_sans.stdout | default(''))
                  else '❌ FAIL — runner private_ip missing from cert SANs, TLS will reject connection'
      }
    ] }}"
  when: node_section == 'runner' and tls_enabled

- name: "CHECK 11 | Read private_key_file — node section {{ node_section }}"
  ansible.builtin.shell:
    cmd: >
      awk '/^\[{{ node_section }}\]/{f=1} f && /^\[/{if(!/^\[{{ node_section }}\]/) f=0} f && /private_key_file/' {{ gateway_conf }}
  register: node_key_conf
  changed_when: false
  ignore_errors: true
  when: tls_enabled

- name: "CHECK 11 | Extract private_key_file path"
  ansible.builtin.set_fact:
    node_key_path: "{{ node_key_conf.stdout.split('=')[1] | trim | replace(\"'\", '') | replace('\"', '') }}"
  when: tls_enabled

- name: "CHECK 11 | Record result — private_key_file set — node section {{ node_section }}"
  ansible.builtin.set_fact:
    check_results: "{{ check_results + [
      {
        'check': 'CHECK 11 — [' + node_section + '] private_key_file is set',
        'expected': 'private_key_file = /path/to/key',
        'actual': node_key_conf.stdout | default('NOT FOUND') if tls_enabled else 'N/A',
        'status': '✅ PASS' if (tls_enabled and (node_key_conf.stdout | default('')) != '') else ('⏭ SKIPPED — TLS disabled' if not tls_enabled else '❌ FAIL')
      }
    ] }}"

- name: "CHECK 12 | Verify private_key_file exists on disk"
  ansible.builtin.stat:
    path: "{{ node_key_path }}"
  register: node_key_stat
  when: tls_enabled and node_key_path is defined and node_key_path != ''

- name: "CHECK 12 | Record result — private_key_file exists on disk"
  ansible.builtin.set_fact:
    check_results: "{{ check_results + [
      {
        'check': 'CHECK 12 — [' + node_section + '] private_key_file exists on disk',
        'expected': 'File exists at ' + (node_key_path | default('N/A')),
        'actual': 'EXISTS' if (node_key_stat.stat.exists | default(false)) else 'NOT FOUND on disk',
        'status': '✅ PASS' if (node_key_stat.stat.exists | default(false)) else ('⏭ SKIPPED — TLS disabled' if not tls_enabled else '❌ FAIL')
      }
    ] }}"

- name: "CHECK 13 | Get cert modulus"
  ansible.builtin.shell:
    cmd: openssl x509 -noout -modulus -in {{ node_cert_path }} | md5sum
  register: node_cert_mod
  changed_when: false
  ignore_errors: true
  when: tls_enabled and node_cert_path is defined and node_cert_path != ''

- name: "CHECK 13 | Get key modulus"
  ansible.builtin.shell:
    cmd: openssl rsa -noout -modulus -in {{ node_key_path }} | md5sum
  register: node_key_mod
  changed_when: false
  ignore_errors: true
  when: tls_enabled and node_key_path is defined and node_key_path != ''

- name: "CHECK 13 | Record result — cert and key matched pair"
  ansible.builtin.set_fact:
    check_results: "{{ check_results + [
      {
        'check': 'CHECK 13 — [' + node_section + '] cert and key are a matched pair',
        'expected': 'Matching md5 hashes',
        'actual': 'cert=' + (node_cert_mod.stdout | default('ERROR')) + ' key=' + (node_key_mod.stdout | default('ERROR')) if tls_enabled else 'N/A',
        'status': '✅ PASS' if (tls_enabled and node_cert_mod.stdout == node_key_mod.stdout) else ('⏭ SKIPPED — TLS disabled' if not tls_enabled else '❌ FAIL')
      }
    ] }}"

- name: "CHECK 14 | Verify cert not expired"
  ansible.builtin.shell:
    cmd: openssl x509 -in {{ node_cert_path }} -noout -checkend 0 && openssl x509 -in {{ node_cert_path }} -noout -dates
  register: node_expiry
  changed_when: false
  ignore_errors: true
  when: tls_enabled and node_cert_path is defined and node_cert_path != ''

- name: "CHECK 14 | Record result — cert not expired"
  ansible.builtin.set_fact:
    check_results: "{{ check_results + [
      {
        'check': 'CHECK 14 — [' + node_section + '] cert is not expired',
        'expected': 'Certificate is valid',
        'actual': node_expiry.stdout | default(node_expiry.stderr | default('ERROR')) if tls_enabled else 'N/A',
        'status': '✅ PASS' if (tls_enabled and node_expiry.rc == 0) else ('⏭ SKIPPED — TLS disabled' if not tls_enabled else '❌ FAIL')
      }
    ] }}"

- name: "CHECK 15 | Get days remaining on cert"
  ansible.builtin.shell:
    cmd: >
      echo $(( ( $(date -d "$(openssl x509 -enddate -noout
      -in {{ node_cert_path }}
      | cut -d= -f2)" +%s) - $(date +%s) ) / 86400 ))
  register: node_days_remaining
  changed_when: false
  ignore_errors: true
  when: tls_enabled and node_cert_path is defined and node_cert_path != ''

- name: "CHECK 15 | Record result — cert days remaining"
  ansible.builtin.set_fact:
    check_results: "{{ check_results + [
      {
        'check': 'CHECK 15 — [' + node_section + '] cert days remaining until expiry',
        'expected': 'More than 30 days remaining',
        'actual': (node_days_remaining.stdout | default('ERROR')) + ' days remaining',
        'status': '✅ PASS' if (node_days_remaining.stdout | default('0') | int > 30)
                  else ('⚠️  WARN — expiring within 30 days' if (node_days_remaining.stdout | default('0') | int > 0)
                  else '❌ FAIL — expired')
      }
    ] }}"

- name: "CHECK 16 | Verify cert is not a self-signed leaf (subject != issuer)"
  ansible.builtin.command:
    cmd: openssl x509 -in {{ node_cert_path }} -noout -subject -issuer
  register: node_self_signed
  changed_when: false
  ignore_errors: true
  when: tls_enabled and node_cert_path is defined and node_cert_path != ''

- name: "CHECK 16 | Record result — cert is not self-signed leaf"
  ansible.builtin.set_fact:
    check_results: "{{ check_results + [
      {
        'check': 'CHECK 16 — [' + node_section + '] cert is not a self-signed leaf (subject != issuer)',
        'expected': 'subject != issuer (CA-signed)',
        'actual': node_self_signed.stdout | default('ERROR') if tls_enabled else 'N/A',
        'status': '✅ PASS' if (tls_enabled and
          node_self_signed.stdout_lines | default([]) | length == 2 and
          node_self_signed.stdout_lines[0] != node_self_signed.stdout_lines[1])
          else ('⏭ SKIPPED — TLS disabled' if not tls_enabled else '❌ FAIL — self-signed leaf rejected by cluster TLS')
      }
    ] }}"

- name: "CHECK 17 | Get SANs from cert"
  ansible.builtin.shell:
    cmd: openssl x509 -in {{ node_cert_path }} -noout -text | grep -A2 "Subject Alternative Name"
  register: node_sans
  changed_when: false
  ignore_errors: true
  when: tls_enabled and node_cert_path is defined and node_cert_path != ''

- name: "CHECK 17 | Record result — cert SANs present"
  ansible.builtin.set_fact:
    check_results: "{{ check_results + [
      {
        'check': 'CHECK 17a — [' + node_section + '] cert SANs present',
        'expected': 'Subject Alternative Name extension present',
        'actual': node_sans.stdout | default('NO SANs FOUND') if tls_enabled else 'N/A',
        'status': '✅ PASS' if (tls_enabled and node_sans.stdout != '') else ('⏭ SKIPPED — TLS disabled' if not tls_enabled else '❌ FAIL — no SAN extension found')
      }
    ] }}"

- name: "CHECK 17 | Record result — server cert SAN contains private_ip"
  ansible.builtin.set_fact:
    check_results: "{{ check_results + [
      {
        'check': 'CHECK 17b — [server] cert SAN contains server private_ip',
        'expected': 'IP:' + hostvars[inventory_hostname]['private_ip'] + ' in Subject Alternative Name',
        'actual': node_sans.stdout | default('NO SANs FOUND'),
        'status': '✅ PASS' if (tls_enabled and ('IP:' + hostvars[inventory_hostname]['private_ip']) in (node_sans.stdout | default('')))
                  else ('⏭ SKIPPED — TLS disabled' if not tls_enabled
                  else '❌ FAIL — server private_ip missing from cert SANs')
      }
    ] }}"
  when: tls_enabled and node_section == 'server'

- name: "CHECK 17 | Record result — server cert SAN contains ansible_host (DNS/hostname)"
  ansible.builtin.set_fact:
    check_results: "{{ check_results + [
      {
        'check': 'CHECK 17c — [server] cert SAN contains ansible_host',
        'expected': 'DNS:' + hostvars[inventory_hostname]['ansible_host'] + ' in Subject Alternative Name',
        'actual': node_sans.stdout | default('NO SANs FOUND'),
        'status': '✅ PASS' if (tls_enabled and ('DNS:' + hostvars[inventory_hostname]['ansible_host']) in (node_sans.stdout | default('')))
                  else ('⏭ SKIPPED — TLS disabled' if not tls_enabled
                  else '⚠️  WARN — ansible_host not in cert SANs (only an issue if connecting by hostname)')
      }
    ] }}"
  when: tls_enabled and node_section == 'server'"

- name: "CHECK 18 | Verify cert signed by CA"
  ansible.builtin.command:
    cmd: openssl verify -CAfile {{ ca_cert_path }} {{ node_cert_path }}
  register: node_verify
  changed_when: false
  ignore_errors: true
  when: tls_enabled and ca_cert_path is defined and ca_cert_path != '' and node_cert_path is defined and node_cert_path != ''

- name: "CHECK 18 | Record result — cert signed by CA"
  ansible.builtin.set_fact:
    check_results: "{{ check_results + [
      {
        'check': 'CHECK 18 — [' + node_section + '] cert is signed by CA',
        'expected': 'OK',
        'actual': node_verify.stdout | default(node_verify.stderr | default('ERROR')) if tls_enabled else 'N/A',
        'status': '✅ PASS' if (tls_enabled and 'OK' in (node_verify.stdout | default(''))) else ('⏭ SKIPPED — TLS disabled' if not tls_enabled else '❌ FAIL')
      }
    ] }}"

- name: "CHECK 19 | Verify extendedKeyUsage on cert (needs serverAuth + clientAuth for mTLS)"
  ansible.builtin.shell:
    cmd: openssl x509 -in {{ node_cert_path }} -noout -text | grep -A3 "Extended Key Usage"
  register: node_eku
  changed_when: false
  ignore_errors: true
  when: tls_enabled and node_cert_path is defined and node_cert_path != ''

- name: "CHECK 19 | Record result — cert extendedKeyUsage"
  ansible.builtin.set_fact:
    check_results: "{{ check_results + [
      {
        'check': 'CHECK 19 — [' + node_section + '] cert has both serverAuth and clientAuth in extendedKeyUsage',
        'expected': 'TLS Web Server Authentication, TLS Web Client Authentication',
        'actual': node_eku.stdout | default('NOT FOUND') if tls_enabled else 'N/A',
        'status': '✅ PASS' if (tls_enabled and
          'Server Authentication' in (node_eku.stdout | default('')) and
          'Client Authentication' in (node_eku.stdout | default('')))
          else ('⚠️  WARN — extendedKeyUsage not set, relying on defaults' if (tls_enabled and node_eku.stdout == '')
          else ('⏭ SKIPPED — TLS disabled' if not tls_enabled
          else '❌ FAIL — missing clientAuth or serverAuth, mTLS handshake will be rejected'))
      }
    ] }}"

- name: "CHECK 19 | Set eku_valid gate — both serverAuth and clientAuth must be present"
  ansible.builtin.set_fact:
    eku_valid: "{{ tls_enabled and
      'Server Authentication' in (node_eku.stdout | default('')) and
      'Client Authentication' in (node_eku.stdout | default('')) }}"

# -----------------------------------------------------------------------
# Server enforces mTLS — server node only
# (CHECK 20b — separate from EKU check above)
# -----------------------------------------------------------------------

- name: "CHECK 20 | Verify runner enforces mTLS (reject connection without client cert)"
  ansible.builtin.shell: |
    set -o pipefail
    echo Q | openssl s_client \
      -connect {{ hostvars[groups[iag5_runner_group][0]]['private_ip'] }}:{{ runner_port }} \
      -CAfile {{ ca_cert_path }} \
      </dev/null 2>&1 | grep -E "alert|handshake failure|error"
  args:
    executable: /bin/bash
  register: sv_mtls_enforce
  changed_when: false
  ignore_errors: true
  when: node_section == 'server' and tls_enabled and eku_valid | default(false) and ca_cert_path is defined and ca_cert_path != ''

- name: "CHECK 20 | Record result — runner enforces mTLS"
  ansible.builtin.set_fact:
    check_results: "{{ check_results + [
      {
        'check': 'CHECK 20 — Runner enforces mTLS (rejects connection without client cert)',
        'expected': 'Connection rejected — alert or handshake failure',
        'actual': sv_mtls_enforce.stdout | default('NO OUTPUT') if (eku_valid | default(false)) else 'N/A — skipped, EKU check failed',
        'status': '✅ PASS' if (eku_valid | default(false) and ('alert' in (sv_mtls_enforce.stdout | default('')) or 'handshake failure' in (sv_mtls_enforce.stdout | default(''))))
          else ('⏭ SKIPPED — EKU invalid, mTLS will fail at handshake' if not (eku_valid | default(false))
          else '❌ FAIL — runner accepted connection without client cert')
      }
    ] }}"
  when: node_section == 'server'

# -----------------------------------------------------------------------
# Process environment check
# -----------------------------------------------------------------------

- name: "CHECK 21 | Get PID of running service"
  ansible.builtin.shell:
    cmd: systemctl show {{ service_name }} --property=MainPID | cut -d= -f2
  register: svc_pid
  changed_when: false
  ignore_errors: true

- name: "CHECK 21 | Verify GATEWAY vars in running process environment"
  ansible.builtin.shell:
    cmd: >
      cat /proc/{{ svc_pid.stdout }}/environ | tr '\0' '\n' |
      grep -E "GATEWAY_APPLICATION_CA|GATEWAY_{{ node_section | upper }}" || true
  register: proc_env
  changed_when: false
  ignore_errors: true

- name: "CHECK 21 | Record result — process running and has GATEWAY vars"
  ansible.builtin.set_fact:
    check_results: "{{ check_results + [
      {
        'check': 'CHECK 21 — Service is running and GATEWAY vars present in process environment',
        'expected': 'GATEWAY vars visible in /proc/PID/environ',
        'actual': proc_env.stdout_lines | default(['NOT FOUND']) | join(', ') if proc_env.stdout != '' else 'NOT FOUND — service may be using gateway.conf only (expected)',
        'status': '✅ PASS' if proc_env.stdout != '' else '⚠️  INFO — vars not in env, confirm gateway.conf is used'
      }
    ] }}"

# -----------------------------------------------------------------------
# Proxy checks — SERVER only
# Verify runner hostnames and IPs are in no_proxy
# Go reads proxy env vars for all outbound connections including gRPC
# openssl s_client bypasses proxy so this must be checked separately
# -----------------------------------------------------------------------

- name: "CHECK 22 | Read no_proxy and NO_PROXY from systemd service"
  ansible.builtin.shell:
    cmd: systemctl show {{ service_name }} | grep Environ | grep -oE "(no_proxy|NO_PROXY)=[^ ]*"
  register: proxy_env
  changed_when: false
  ignore_errors: true
  when: node_section == 'server'

- name: "CHECK 22 | Record result — no_proxy is set"
  ansible.builtin.set_fact:
    check_results: "{{ check_results + [
      {
        'check': 'CHECK 22 — no_proxy/NO_PROXY is set in systemd service',
        'expected': 'no_proxy and NO_PROXY env vars present',
        'actual': proxy_env.stdout | default('NOT SET'),
        'status': '✅ PASS' if proxy_env.stdout != '' else '⚠️  WARN — no proxy exclusions set, all traffic may go through proxy'
      }
    ] }}"
  when: node_section == 'server'

- name: "CHECK 23 | Verify each runner private IP is in no_proxy"
  ansible.builtin.set_fact:
    check_results: "{{ check_results + [
      {
        'check': 'CHECK 23 — Runner private IP ' + hostvars[item]['private_ip'] + ' is in no_proxy',
        'expected': hostvars[item]['private_ip'] + ' present in no_proxy',
        'actual': proxy_env.stdout | default('NOT SET'),
        'status': '✅ PASS' if hostvars[item]['private_ip'] in (proxy_env.stdout | default('')) else '❌ FAIL — runner IP not in no_proxy, gRPC will route through proxy'
      }
    ] }}"
  loop: "{{ groups[iag5_runner_group] }}"
  loop_control:
    label: "{{ hostvars[item]['private_ip'] }}"
  when: node_section == 'server'

- name: "CHECK 24 | Verify each runner hostname is in no_proxy"
  ansible.builtin.set_fact:
    check_results: "{{ check_results + [
      {
        'check': 'CHECK 24 — Runner hostname ' + hostvars[item]['ansible_host'] + ' is in no_proxy',
        'expected': hostvars[item]['ansible_host'] + ' present in no_proxy',
        'actual': proxy_env.stdout | default('NOT SET'),
        'status': '✅ PASS' if hostvars[item]['ansible_host'] in (proxy_env.stdout | default('')) else '❌ FAIL — runner hostname not in no_proxy, gRPC will route through proxy'
      }
    ] }}"
  loop: "{{ groups[iag5_runner_group] }}"
  loop_control:
    label: "{{ hostvars[item]['ansible_host'] }}"
  when: node_section == 'server'

# -----------------------------------------------------------------------
# Live mTLS connection — SERVER only, loops over all runners
# -----------------------------------------------------------------------

- name: "CHECK 25 | Resolve all runner IPs from server"
  ansible.builtin.command:
    cmd: "getent ahosts {{ hostvars[item]['private_ip'] }}"
  register: runner_resolutions
  changed_when: false
  ignore_errors: true
  loop: "{{ groups[iag5_runner_group] }}"
  loop_control:
    label: "{{ hostvars[item]['private_ip'] }}"
  when: node_section == 'server' and tls_enabled

- name: "CHECK 25 | Record result — runner host resolution"
  ansible.builtin.set_fact:
    check_results: "{{ check_results + [
      {
        'check': 'CHECK 25 — Runner host resolves from server (' + hostvars[item.item]['private_ip'] + ')',
        'expected': 'Host resolves successfully',
        'actual': item.stdout | default('FAILED TO RESOLVE'),
        'status': '✅ PASS' if item.rc == 0 else '❌ FAIL'
      }
    ] }}"
  loop: "{{ runner_resolutions.results }}"
  loop_control:
    label: "{{ hostvars[item.item]['private_ip'] }}"
  when: node_section == 'server' and tls_enabled

- name: "CHECK 26 | Test TCP connectivity SERVER → all runners"
  ansible.builtin.wait_for:
    host: "{{ hostvars[item]['private_ip'] }}"
    port: "{{ runner_port }}"
    timeout: 5
  register: tcp_checks
  ignore_errors: true
  loop: "{{ groups[iag5_runner_group] }}"
  loop_control:
    label: "{{ hostvars[item]['private_ip'] }}"
  when: node_section == 'server' and tls_enabled

- name: "CHECK 26 | Record result — TCP connectivity to all runners"
  ansible.builtin.set_fact:
    check_results: "{{ check_results + [
      {
        'check': 'CHECK 26 — TCP connectivity SERVER → RUNNER (' + hostvars[item.item]['private_ip'] + ':' + runner_port | string + ')',
        'expected': 'Port reachable within 5 seconds',
        'actual': 'REACHABLE' if not item.failed else 'UNREACHABLE — check security groups',
        'status': '✅ PASS' if not item.failed else '❌ FAIL'
      }
    ] }}"
  loop: "{{ tcp_checks.results }}"
  loop_control:
    label: "{{ hostvars[item.item]['private_ip'] }}"
  when: node_section == 'server' and tls_enabled

- name: "CHECK 27 | Run TLS handshake with IP verification SERVER → all runners"
  ansible.builtin.shell: |
    set -o pipefail
    openssl s_client \
      -connect {{ hostvars[item]['private_ip'] }}:{{ runner_port }} \
      -verify_ip {{ hostvars[item]['private_ip'] }} \
      -verify_return_error \
      -cert {{ node_cert_path }} \
      -key {{ node_key_path }} \
      -CAfile {{ ca_cert_path }} \
      -showcerts </dev/null
  args:
    executable: /bin/bash
  register: tls_handshakes
  changed_when: false
  ignore_errors: true
  loop: "{{ groups[iag5_runner_group] }}"
  loop_control:
    label: "{{ hostvars[item]['private_ip'] }}"
  when: node_section == 'server' and tls_enabled and eku_valid | default(false) and node_cert_path is defined and node_cert_path != '' and node_key_path is defined and node_key_path != '' and ca_cert_path is defined and ca_cert_path != ''

- name: "CHECK 27 | Record result — TLS handshake with IP verification"
  ansible.builtin.set_fact:
    check_results: "{{ check_results + [
      {
        'check': 'CHECK 27 — TLS handshake with IP verification SERVER → RUNNER (' + hostvars[item.item]['private_ip'] + ')',
        'expected': 'Verify return code: 0 (ok)',
        'actual': (item.stdout | default('') + item.stderr | default('')) | regex_search('Verify return code.*') | default('No verify return code found'),
        'status': '✅ PASS' if (eku_valid | default(false) and 'Verify return code: 0' in (item.stdout | default('') + item.stderr | default('')))
          else ('⏭ SKIPPED — EKU invalid, mTLS handshake will be rejected' if not (eku_valid | default(false))
          else '❌ FAIL')
      }
    ] }}"
  loop: "{{ tls_handshakes.results }}"
  loop_control:
    label: "{{ hostvars[item.item]['private_ip'] }}"
  when: node_section == 'server' and tls_enabled

# -----------------------------------------------------------------------
# SUMMARY
# -----------------------------------------------------------------------
- name: "SUMMARY | Print results"
  ansible.builtin.include_tasks: ../../certcheck_common/tasks/summary.yml
  vars:
    role_title: "CLUSTER TLS — SERVER ↔ RUNNER (gRPC mTLS) — {{ node_section | upper }} NODE"
