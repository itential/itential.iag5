---
########################################################
# certcheck_connect_server_to_gwm default variables
########################################################

# Gateway config file path — derived from deployer role variable
server_gateway_conf: "{{ gateway_server_config_dir }}/gateway.conf"

# Service name — matches the systemd unit installed by the deployer
service_name: iagctl

# GWM host and port — derived by splitting gateway_server_connect_hosts (format: "IP:port")
# gateway_server_connect_hosts is required in the deployer inventory when connect is enabled
gwm_host: "{{ gateway_server_connect_hosts.split(':')[0] }}"
gwm_port: "{{ gateway_server_connect_hosts.split(':')[1] }}"

# OS CA bundle path for validating GWM's publicly-signed TLS certificate
os_ca_bundle: /etc/pki/tls/certs/ca-bundle.crt

# private_ip — used for SAN validation.
# Defaults to ansible_host since the deployer does not define private_ip.
private_ip: "{{ hostvars[inventory_hostname]['private_ip'] | default(ansible_host) }}"
