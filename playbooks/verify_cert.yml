---
# IAG5 TLS Certificate Verification
#
# Runs after deployment to verify that all TLS certificates are correctly
# configured across all IAG5 node types. All variables are derived from the
# deployer's existing inventory — no separate verify_cert inventory required.
#
# Runs automatically as the final step of site.yml.
# Can also be run standalone:
#
#   ansible-playbook itential.iag5.verify_cert -i <inventory>

# -----------------------------------------------------------------------
# PLAY 1 — Gateway server and runner nodes
# -----------------------------------------------------------------------
- name: "VERIFY_CERT | Gateway server and runner TLS certificate verification"
  hosts: iag5_servers:iag5_runners
  become: true
  tags: [verify_cert]
  roles:
    - role: itential.iag5.gateway
      tags: always
  tasks:
    - name: "Run gateway server/runner cert verification"
      ansible.builtin.include_role:
        name: itential.iag5.gateway_server
        tasks_from: verify_cert.yml

# -----------------------------------------------------------------------
# PLAY 2 — Gateway client nodes (only runs when iag5_clients hosts exist)
# -----------------------------------------------------------------------
- name: "VERIFY_CERT | Gateway client TLS certificate verification"
  hosts: iag5_clients
  become: true
  tags: [verify_cert]
  roles:
    - role: itential.iag5.gateway
      tags: always
  tasks:
    - name: "Run gateway client cert verification"
      ansible.builtin.include_role:
        name: itential.iag5.gateway_client
        tasks_from: verify_cert.yml
